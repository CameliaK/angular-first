<div class="container">
    <form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)">
        <h2 class="text-center m-2">User Information</h2>
        <div class="form-group m-2">
            <label>Firts Name</label>
            <input type="text" class="form-control" placeholder="Enter Fist Name" name="firstName" [(ngModel)] = "userObject.firstName">
        </div>
        {{userObject}}
        <div class="form-group m-2">
            <label>Last Name</label>
            <input type="text" class="form-control" placeholder="Enter Last Name" name="lastName" [(ngModel)] = "userObject.lastName">
        </div>
        <div class="form-group m-2">
            <label>Email</label>
            <input type="email" class="form-control" placeholder="Enter Email Adress" name="email" [(ngModel)] = "userObject.email">
        </div>
        <div class="form-group m-2">
            <label>Password</label>
            <input type="password" class="form-control" placeholder="Enter password" name="password" [(ngModel)] = "userObject.pass">
        </div>
        <div class="form-check m-2">
            <label>Check me out</label>
            <input type="checkbox" class="form-check-input" name="icCheck" [(ngModel)] = "userObject.isCheck">
        </div>
        <button class="btn btn-success m-2">Submit</button>
    </form>
</div>

<div align="center">
    <h4>One way Data Binding</h4>
    <div>
        <p>1. Interpolation</p>
        <p><b>{{topic}}</b> from {{name}}</p>
    </div>
    <div>
        <p>2. Property Binging</p>
        <input type="text" name="" id="" [value]="topic">
        <div style = "height: 400px; width: 400px; border: 1px solid black">
            <img [src]="image" alt="">  
        </div>
    </div>
    <div>
        <p>3. Event Binding</p>
        <button (click)="onSave()">Save</button>
        <select (change)="onChange()">
            <option value="Mexico">Mexico</option>
            <option value="US">US</option>
            <option value="Canada">Canada</option>
            <option value="India">India</option>
            <option value="Spain">Spain</option>
        </select>
    </div>
    <h4>Two way Data Binding</h4>
    <div>
        <input type="text" [(ngModel)] = "topic">
        {{topic}}
    </div>
</div>
